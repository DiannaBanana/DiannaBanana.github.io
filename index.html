<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFK</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍓</text></svg>">
    <style>
        :root {
            --bg: #121820;          /* Deep Midnight Blue */
            --burnt-orange: #c85a32;/* Autumn Copper */
            --forest-green: #2d5a27;/* Moody Jade */
            --mustard: #d4a342;     /* Vintage Gold */
            --cream: #e6dfd3;       /* Aged Parchment */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--cream);
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Weird Impossible Geometry Scene */
        .scenery {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .shape {
            position: absolute;
            animation: float 10s infinite ease-in-out;
            border-radius: 4px; /* Default slightly rounded corners */
        }

        /* ---- ARCHITECTURAL SHAPES ---- */

        /* Giant Monolithic Step Tower */
        .monolith {
            width: 180px;
            height: 380px;
            background: linear-gradient(135deg, var(--forest-green) 30%, #1e3d1a);
            bottom: -5%;
            right: 8%;
            clip-path: polygon(0% 100%, 0% 30%, 40% 30%, 40% 15%, 70% 15%, 70% 0%, 100% 0%, 100% 100%);
            opacity: 0.45;
            transform: rotate(-5deg);
        }

        /* Oversized Floating Archway fragment */
        .archway {
            width: 280px;
            height: 240px;
            background: var(--burnt-orange);
            top: -5%;
            left: -5%;
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 75% 100%, 75% 40%, 25% 40%, 25% 100%, 0% 100%);
            opacity: 0.6;
            transform: rotate(15deg);
            animation-delay: -3s;
        }

        /* Elongated Golden Needle / Spire */
        .spire {
            width: 30px;
            height: 450px;
            background: var(--mustard);
            bottom: 10%;
            left: 18%;
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
            opacity: 0.35;
            transform: rotate(-25deg);
            animation-delay: -6s;
        }

        /* Impossible Floating Wedge */
        .wedge {
            width: 140px;
            height: 140px;
            background: var(--burnt-orange);
            top: 40%;
            right: 15%;
            clip-path: polygon(100% 0%, 0% 50%, 100% 100%);
            opacity: 0.5;
            transform: rotate(45deg);
            animation-delay: -1.5s;
        }

        /* Giant inverted hollow triangle */
        .portal {
            width: 320px;
            height: 320px;
            background: var(--forest-green);
            bottom: -10%;
            left: -5%;
            clip-path: polygon(50% 100%, 0% 0%, 100% 0%, 50% 100%, 50% 75%, 75% 20%, 25% 20%, 50% 75%);
            opacity: 0.4;
            transform: rotate(12deg);
            animation-delay: -4s;
        }

        /* Floating staggered zig-zag step fragment */
        .steps {
            width: 150px;
            height: 90px;
            background: var(--mustard);
            top: 15%;
            right: 25%;
            clip-path: polygon(0% 100%, 0% 66%, 33% 66%, 33% 33%, 66% 33%, 66% 0%, 100% 0%, 100% 33%, 66% 33%, 66% 66%, 33% 66%, 33% 100%);
            opacity: 0.55;
            transform: rotate(-15deg);
            animation-delay: -7.5s;
        }

        /* Long abstract beam slicing through the backdrop */
        .beam {
            width: 500px;
            height: 25px;
            background: linear-gradient(90deg, transparent, var(--burnt-orange), transparent);
            top: 65%;
            left: -10%;
            transform: rotate(-35deg);
            opacity: 0.3;
            animation-delay: -2s;
        }

        /* Small floating geometric peak near the text */
        .shard {
            width: 60px;
            height: 90px;
            background: var(--cream);
            top: 30%;
            left: 45%;
            clip-path: polygon(50% 0%, 100% 100%, 30% 100%);
            opacity: 0.15;
            transform: rotate(20deg);
            animation-delay: -5s;
        }

        /* ---- CIRCULAR/BLOBBY LAYER ---- */

        /* Original blurred out circle (Top Right) */
        .sphere-right {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle at 30% 30%, rgba(200, 90, 50, 0.4), transparent 80%);
            border-radius: 50%;
            top: 10%;
            right: -5%;
            opacity: 0.3;
            filter: blur(15px);
            animation: float 12s infinite ease-in-out;
            animation-delay: -1s;
        }

        /* New similar blurred circle (Top Left-Center) */
        .sphere-left {
            width: 280px;
            height: 280px;
            background: radial-gradient(circle at 70% 70%, rgba(200, 90, 50, 0.4), transparent 80%);
            border-radius: 50%;
            top: 5%;
            left: 15%;
            opacity: 0.25;
            filter: blur(12px);
            animation: float 13s infinite ease-in-out;
            animation-delay: -3s;
        }

        /* Irregular blob shape */
        .blob-1 {
            width: 250px;
            height: 200px;
            background: rgba(45, 90, 39, 0.5); /* Semi-trans forest green */
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            top: 55%;
            left: 20%;
            opacity: 0.4;
            animation: float 11s infinite ease-in-out;
            animation-delay: -4.5s;
        }

        /* Small abstract ring/torus fragment */
        .ring {
            width: 100px;
            height: 100px;
            border: 15px solid var(--mustard);
            border-radius: 50%;
            bottom: 25%;
            left: 40%;
            opacity: 0.25;
            clip-path: polygon(0 0, 100% 0, 100% 60%, 0 60%);
            transform: rotate(30deg);
            animation-delay: -8s;
        }

        /* Small clustered oval blobs */
        .blob-cluster {
            width: 60px;
            height: 60px;
            background: var(--cream);
            border-radius: 50%;
            opacity: 0.1;
            top: 70%;
            right: 35%;
            box-shadow: -40px 10px 0 5px rgba(230, 223, 211, 0.05),
                        30px -20px 0 -5px rgba(230, 223, 211, 0.08);
            animation-delay: -2.5s;
        }

        /* Medium blob over dynamic geometric shape */
        .blob-2 {
            width: 180px;
            height: 150px;
            background: rgba(212, 163, 66, 0.6); /* Semi-trans mustard */
            border-radius: 70% 30% 50% 50% / 30% 60% 40% 70%;
            top: -10%;
            right: 40%;
            opacity: 0.45;
            animation: float 10.5s infinite ease-in-out;
            animation-delay: -6s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(var(--r, 0deg)); }
            50% { transform: translateY(-30px) rotate(calc(var(--r, 0deg) + 3deg)); }
        }

        /* Rotation base for geometric shapes */
        .monolith { --r: -5deg; }
        .archway { --r: 15deg; }
        .spire { --r: -25deg; }
        .wedge { --r: 45deg; }
        .portal { --r: 12deg; }
        .steps { --r: -15deg; }
        .beam { --r: -35deg; }
        .shard { --r: 20deg; }
        .ring { --r: 30deg; }

        main {
            text-align: center;
            z-index: 1;
            user-select: none;
        }

        h1 {
            font-size: clamp(3.5rem, 12vw, 6rem);
            font-weight: normal;
            font-style: italic;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 0.6rem;
            text-shadow: 0 0 40px rgba(18, 24, 32, 0.9);
        }

        p {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 1.1rem;
            color: var(--cream);
            opacity: 0.7;
            letter-spacing: 3px;
            text-transform: lowercase;
        }
    </style>
</head>
<body>

    <div class="scenery">
        <div class="shape monolith"></div>
        <div class="shape archway"></div>
        <div class="shape spire"></div>
        <div class="shape wedge"></div>
        <div class="shape portal"></div>
        <div class="shape steps"></div>
        <div class="shape beam"></div>
        <div class="shape shard"></div>
        
        <div class="shape sphere-right"></div>
        <div class="shape sphere-left"></div>
        <div class="shape blob-1"></div>
        <div class="shape ring"></div>
        <div class="shape blob-cluster"></div>
        <div class="shape blob-2"></div>
    </div>

    <main>
        <h1>afk...</h1>
        <p>site brewing 🫧</p>
    </main>

</body>
</html>
